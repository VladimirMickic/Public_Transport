name: AI Weekly Insights

on:
  schedule:
    # Run Sunday at 12:00 UTC (Sunday 08:00 EDT / 07:00 EST) — after
    # EMTA's full Saturday service is complete and before the rider's
    # week begins. The previous schedule used '50 3 * * 6' (Saturday
    # 03:50 UTC), which is actually Friday 23:50 ET — i.e. it fired
    # before any Saturday bus had run. Sunday morning ET is the
    # natural "weekly wrap-up" window.
    - cron: '0 12 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate Weekly Insights
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # Generates the weekly AI report for the current week
        python3 -m ai_agent.insights
