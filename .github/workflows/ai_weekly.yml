name: AI Weekly Insights

on:
  schedule:
    # Run Saturday at 03:50 UTC (Saturday 23:50 EDT / 22:50 EST) — after
    # EMTA's last Saturday bus. EMTA does not operate Sundays, so the
    # weekly wrap-up for this week lands as soon as service is over.
    - cron: '50 3 * * 6'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate Weekly Insights
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # Generates the weekly AI report for the current week
        python3 -m ai_agent.insights
