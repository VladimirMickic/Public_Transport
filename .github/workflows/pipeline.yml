name: EMTA Transit Tracker Pipeline

on:
  schedule:
    # Run every 5 minutes. The fetch_realtime script handles skipping outside service hours.
    - cron: '*/5 * * * *'
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ETL Pipeline
      env:
        # Load these from GitHub Repository Secrets
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # 1. Ingest vehicles -> bronze
        python3 -m ingestion.fetch_realtime
        
        # 2. Transform bronze -> silver (last 1 day)
        python3 -m transform.silver --days-back 1
        
        # 3. Aggregate silver -> gold
        python3 -m transform.gold
