name: EMTA Transit Tracker Pipeline

on:
  schedule:
    # Run every 5 minutes. The fetch_realtime script handles skipping outside service hours.
    - cron: '*/5 * * * *'
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ETL Pipeline
      env:
        # Load these from GitHub Repository Secrets
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # 1. Ingest vehicles -> bronze
        python3 -m ingestion.fetch_realtime

        # 2. Transform bronze -> silver (last 1 day)
        python3 -m transform.silver --days-back 0.05

        # 3. Aggregate silver -> gold
        python3 -m transform.gold

    - name: Auto-generate daily digest at end of service
      if: success()
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # --if-idle is a no-op before 22:00 ET, on Sundays, or while
        # buses are still moving. One actual AI call per service day.
        python3 -m ai_agent.daily_insights --if-idle
